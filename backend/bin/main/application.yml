spring:
  application:
    name: pickles-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  output:
    ansi:
      enabled: ALWAYS

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/appaammas_pickles?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
    username: ${SPRING_DATASOURCE_USERNAME:pickles}
    password: ${SPRING_DATASOURCE_PASSWORD:picklespass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc.time_zone: Asia/Kolkata

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8001}
  servlet:
    context-path: /
  compression:
    enabled: true
  error:
    # Dev defaults; overridden to `never` in application-prod.yml.
    include-message: always
    include-binding-errors: always

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-me-in-production-this-must-be-at-least-32-chars-long}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
  customer-jwt:
    # Distinct from app.jwt — customer (storefront) JWTs use their own signing key so admin
    # and customer tokens cannot be substituted for each other.
    secret: ${APP_CUSTOMER_JWT_SECRET:change-me-customer-secret-must-be-at-least-32-chars-long}
    expiration-ms: ${APP_CUSTOMER_JWT_EXPIRATION_MS:604800000}   # 7 days
  otp:
    code-length: ${APP_OTP_CODE_LENGTH:6}
    ttl: ${APP_OTP_TTL:PT10M}
    max-attempts: ${APP_OTP_MAX_ATTEMPTS:5}
    rate-limit-max-per-window: ${APP_OTP_RATE_MAX:5}
    rate-limit-window: ${APP_OTP_RATE_WINDOW:PT15M}
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:rzp_test_placeholder}
    key-secret: ${RAZORPAY_KEY_SECRET:placeholder_secret}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: ERROR
    com.appaamma: INFO
    org.hibernate.SQL: INFO
